publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  image_picker: ^1.1.0
  google_sign_in: ^6.2.1
  google_generative_ai: ^0.4.0
  share_plus: ^9.0.0
  provider: ^6.1.2
  camera: ^0.10.5
